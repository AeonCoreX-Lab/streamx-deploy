version: '3.9'

services:
  addon:
    build: .
    restart: unless-stopped
    ports:
      - "7000:7000"
    environment:
      - PORT=7000
      - ADDON_ID=${ADDON_ID:-community.myname.myaddon}
      - ADDON_NAME=${ADDON_NAME:-My StreamX Addon}
      - ADDON_VERSION=${ADDON_VERSION:-1.0.0}
      # Add your API keys here (or in .env file):
      # - MY_API_KEY=${MY_API_KEY}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:7000/health"]
      interval: 30s
      timeout:  10s
      retries:  3

  # Optional: Caddy reverse proxy for HTTPS
  # Uncomment if you want HTTPS on your domain:
  # caddy:
  #   image: caddy:2-alpine
  #   restart: unless-stopped
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     - ./Caddyfile:/etc/caddy/Caddyfile
  #     - caddy_data:/data
  #   depends_on:
  #     - addon

