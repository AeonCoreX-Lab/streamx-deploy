# templates/github/cloudflare.yml
name: Deploy to Cloudflare Workers
on:
  push:
    branches: [main]
  workflow_dispatch:
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken:  ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          command:   deploy --env production
      - name: Verify live
        run: |
          sleep 5
          curl -sf https://your-addon.workers.dev/manifest.json | python3 -c \
            "import sys,json; d=json.load(sys.stdin); print('✅', d['name'], d['version'])"
