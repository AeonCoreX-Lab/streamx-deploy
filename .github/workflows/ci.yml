name: CI — Validate & Release

on:
  push:
    branches: [main]
    tags:     ['v*.*.*']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  # ── Validate bash scripts ─────────────────────────────────────────────────
  validate:
    name: Validate Scripts
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Check bash syntax
        run: |
          bash -n streamx-deploy && echo "✓ streamx-deploy syntax OK"
          bash -n install.sh     && echo "✓ install.sh syntax OK"

      - name: Install shellcheck
        run: sudo apt-get install -y shellcheck

      - name: Shellcheck linting
        run: |
          shellcheck -S warning streamx-deploy || true
          shellcheck -S warning install.sh     || true

      - name: Check executable permissions
        run: |
          [ -x streamx-deploy ] && echo "✓ streamx-deploy is executable" \
            || { echo "✗ streamx-deploy not executable"; exit 1; }
          [ -x install.sh ] && echo "✓ install.sh is executable" \
            || { echo "✗ install.sh not executable"; exit 1; }

      - name: Test help command
        run: |
          bash streamx-deploy help
          bash streamx-deploy version
          bash streamx-deploy platforms

      - name: Test on macOS runner
        if: runner.os == 'macOS'
        run: bash streamx-deploy version

  # ── Publish to GitHub Pages ───────────────────────────────────────────────
  publish:
    name: Publish to GitHub Pages
    runs-on: ubuntu-latest
    needs: validate
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
      pages:    write
      id-token: write

    environment:
      name: github-pages
      url:  ${{ steps.deploy.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - name: Prepare GitHub Pages content
        run: |
          mkdir -p _site

          # Copy main scripts
          cp streamx-deploy _site/streamx-deploy
          cp install.sh     _site/install.sh
          cp README.md      _site/README.md

          # Make scripts executable in the site
          chmod +x _site/streamx-deploy _site/install.sh

          # Create index page
          cat > _site/index.html << 'EOF'
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8">
            <title>streamx-deploy</title>
            <style>
              body { font-family: monospace; background: #06060f; color: #e8e8f0;
                     max-width: 700px; margin: 60px auto; padding: 24px; }
              h1   { color: #82b1ff; }
              code { background: #0e0e18; padding: 2px 8px; border-radius: 4px; color: #81c784; }
              pre  { background: #0e0e18; padding: 16px; border-radius: 8px; overflow-x: auto; }
              a    { color: #82b1ff; }
            </style>
          </head>
          <body>
            <h1>streamx-deploy</h1>
            <p>Deploy StreamX / Stremio addons anywhere — Cloudflare, Vercel, Render, Railway, VPS.</p>
            <h2>Install</h2>
            <pre>curl -sSL https://aeoncorex-lab.github.io/streamx-deploy/install.sh | bash</pre>
            <h2>Files</h2>
            <ul>
              <li><a href="streamx-deploy">streamx-deploy</a> — main CLI script</li>
              <li><a href="install.sh">install.sh</a> — installer</li>
              <li><a href="README.md">README.md</a> — documentation</li>
            </ul>
            <h2>Quick start</h2>
            <pre>streamx-deploy new
streamx-deploy deploy
streamx-deploy register</pre>
          </body>
          </html>
          EOF

          echo "✓ Site prepared"
          ls -la _site/

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v4

      - name: Upload to Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4

  # ── Create GitHub Release on tag push ─────────────────────────────────────
  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: validate
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Get version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Create release archive
        run: |
          tar -czf streamx-deploy-${{ steps.version.outputs.version }}.tar.gz \
            streamx-deploy install.sh README.md
          zip streamx-deploy-${{ steps.version.outputs.version }}.zip \
            streamx-deploy install.sh README.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "streamx-deploy ${{ steps.version.outputs.version }}"
          tag_name: ${{ github.ref_name }}
          files: |
            streamx-deploy-${{ steps.version.outputs.version }}.tar.gz
            streamx-deploy-${{ steps.version.outputs.version }}.zip
            streamx-deploy
            install.sh
          body: |
            ## Install
            ```bash
            curl -sSL https://aeoncorex-lab.github.io/streamx-deploy/install.sh | bash
            ```
            ## Changes
            See [CHANGELOG](README.md) for details.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
